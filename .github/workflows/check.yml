name: Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
